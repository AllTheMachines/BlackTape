name: macOS VNC Session

on:
  workflow_dispatch:

jobs:
  vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install BlackTape DMG
        run: |
          curl -L https://github.com/AllTheMachines/BlackTape/releases/download/v0.3.0/BlackTape_0.3.0_aarch64.dmg -o blacktape.dmg
          hdiutil attach blacktape.dmg -nobrowse
          cp -R "/Volumes/BlackTape/BlackTape.app" /Applications/
          hdiutil detach "/Volumes/BlackTape"

      - name: Launch BlackTape
        run: |
          # Prevent sleep
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0
          caffeinate -d -t 21600 &

          # Launch the app
          sudo -u runner open -a BlackTape
          sleep 8

      - name: Start screenshot server and ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok authtoken "$NGROK_AUTH_TOKEN"

          # Create screenshot directory with auto-refresh HTML viewer
          mkdir -p /tmp/screen
          cat > /tmp/screen/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>BlackTape macOS Screen</title>
            <meta http-equiv="refresh" content="2">
            <style>
              body { margin: 0; background: #000; display: flex; justify-content: center; }
              img { max-width: 100%; height: auto; }
            </style>
          </head>
          <body>
            <img src="screen.png?t=1" id="img">
            <script>
              // Reload just the image without full page refresh
              setInterval(() => {
                document.getElementById('img').src = 'screen.png?t=' + Date.now();
              }, 2000);
            </script>
          </body>
          </html>
          EOF

          # Screenshot loop in background
          (while true; do
            screencapture -x /tmp/screen/screen.png 2>/dev/null
            sleep 2
          done) &

          # Serve screenshots via HTTP
          cd /tmp/screen && python3 -m http.server 8080 &
          sleep 2

          # Open ngrok HTTP tunnel
          ngrok http 8080 &
          sleep 8

          # Print the URL
          curl -s http://localhost:4040/api/tunnels | python3 -c \
            "import sys,json; t=json.load(sys.stdin)['tunnels'][0]['public_url']; print(); print('=============================================='); print('SCREEN URL:', t); print('Open in browser — refreshes every 2 seconds'); print('=============================================='); print()"

      - name: Keep session alive (up to 6 hours)
        run: |
          echo "Session is live. Open the URL in your browser to see the screen."
          sleep 21600

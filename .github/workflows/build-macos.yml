name: Build macOS

on:
  workflow_dispatch:  # run manually from the Actions tab
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest  # Apple Silicon (arm64)

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Download llama-server (arm64)
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "Downloading llama.cpp $RELEASE"
          curl -L "https://github.com/ggml-org/llama.cpp/releases/download/${RELEASE}/llama-${RELEASE}-bin-macos-arm64.tar.gz" -o llama-macos.tar.gz
          tar -xzf llama-macos.tar.gz
          # Tauri sidecar naming convention: <name>-<target-triple>
          cp llama-${RELEASE}/llama-server src-tauri/binaries/llama-server-aarch64-apple-darwin
          chmod +x src-tauri/binaries/llama-server-aarch64-apple-darwin

      - name: Import Apple certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build app (signed)
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Build app (unsigned — no cert configured)
        if: ${{ env.APPLE_CERTIFICATE == '' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --config '{"bundle":{"macOS":{"signingIdentity":null}}}'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackTape-macOS-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 14

      - name: Upload update bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackTape-macOS-updater
          path: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 14

      - name: Update latest.json with macOS entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the update bundle and its signature
          APP_TAR=$(find src-tauri/target/release/bundle/macos -name "*.app.tar.gz" | head -1)
          APP_SIG=$(find src-tauri/target/release/bundle/macos -name "*.app.tar.gz.sig" | head -1)

          if [ -z "$APP_TAR" ] || [ -z "$APP_SIG" ]; then
            echo "No .app.tar.gz or .sig found — skipping latest.json update"
            exit 0
          fi

          # Get version from Cargo.toml
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          echo "Version: $VERSION"

          # Signature: base64-encode the entire .sig file (Tauri updater requirement)
          # macOS BSD base64 uses -i for file input; GNU base64 uses positional arg + -w0
          SIG=$(base64 -w0 "$APP_SIG" 2>/dev/null || base64 -i "$APP_SIG")

          # Asset URL — points to GitHub release (where we'll upload the tar.gz)
          REPO="${GITHUB_REPOSITORY}"
          TAR_FILENAME=$(basename "$APP_TAR")
          ASSET_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${TAR_FILENAME}"

          echo "Asset URL: $ASSET_URL"

          # Download current latest.json from release, patch it, re-upload
          mkdir -p /tmp/updater
          gh release download "v${VERSION}" --pattern latest.json --dir /tmp/updater 2>/dev/null || true

          if [ -f /tmp/updater/latest.json ]; then
            # Add darwin-aarch64 entry to existing latest.json
            python3 - <<PYEOF
          import json, sys

          with open('/tmp/updater/latest.json') as f:
              data = json.load(f)

          data['platforms']['darwin-aarch64'] = {
              'signature': '${SIG}',
              'url': '${ASSET_URL}'
          }

          with open('/tmp/updater/latest.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("Patched latest.json:")
          print(json.dumps(data, indent=2))
          PYEOF

            # Upload the .app.tar.gz and updated latest.json to the release
            gh release upload "v${VERSION}" "$APP_TAR" /tmp/updater/latest.json --clobber
          else
            echo "No existing release v${VERSION} found — skipping latest.json upload"
            echo "Run this after creating the release manually"
          fi

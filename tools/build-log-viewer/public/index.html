<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercury — Build Log</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* --- Header --- */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: 0 1.5rem;
}

.header-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 0;
}

.branding {
  font-size: 0.875rem;
  font-weight: 600;
  color: #e6edf3;
}

.branding::before {
  content: '> ';
  color: #484f58;
}

.status {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: #8b949e;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f85149;
  transition: background 0.3s;
}

.status-dot.connected {
  background: #3fb950;
}

/* --- Main --- */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* --- Log entries --- */
.log-content h2 {
  color: #e6edf3;
  font-size: 0.875rem;
  font-weight: 600;
  margin: 2rem 0 1rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid #30363d;
}

.log-content h2:first-child {
  margin-top: 0;
}

.log-content h3 {
  color: #e6edf3;
  font-size: 0.8125rem;
  font-weight: 600;
  margin: 1.25rem 0 0.5rem;
}

.log-content h4 {
  color: #c9d1d9;
  font-size: 0.8125rem;
  font-weight: 600;
  margin: 1rem 0 0.375rem;
}

.log-content p {
  margin: 0.5rem 0;
  color: #c9d1d9;
  font-size: 0.8125rem;
}

.log-content hr {
  border: none;
  border-top: 1px solid #30363d;
  margin: 2rem 0;
}

/* Blockquotes — Steve's words */
.log-content blockquote {
  border-left: 3px solid #d29922;
  padding: 0.5rem 0.75rem;
  margin: 0.75rem 0;
  background: rgba(210, 153, 34, 0.06);
  border-radius: 0 0.375rem 0.375rem 0;
}

.log-content blockquote p {
  color: #e6edf3;
  font-style: italic;
  font-size: 0.8125rem;
}

/* Commit lines inside blockquotes */
.log-content blockquote strong {
  color: #d29922;
}

/* Code blocks */
.log-content pre {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 0.375rem;
  padding: 0.75rem;
  margin: 0.75rem 0;
  overflow-x: auto;
  font-size: 0.75rem;
  line-height: 1.5;
}

.log-content code {
  font-family: inherit;
  font-size: 0.75rem;
  color: #e6edf3;
}

.log-content p code {
  background: #21262d;
  padding: 0.125rem 0.375rem;
  border-radius: 0.25rem;
  font-size: 0.75rem;
}

/* Lists */
.log-content ul, .log-content ol {
  padding-left: 1.5rem;
  margin: 0.5rem 0;
}

.log-content li {
  font-size: 0.8125rem;
  margin: 0.25rem 0;
  color: #c9d1d9;
}

.log-content li strong {
  color: #e6edf3;
}

/* Tables */
.log-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0.75rem 0;
  font-size: 0.75rem;
}

.log-content th {
  text-align: left;
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid #30363d;
  color: #8b949e;
  font-weight: 600;
}

.log-content td {
  padding: 0.375rem 0.75rem;
  border-bottom: 1px solid #21262d;
  color: #c9d1d9;
}

/* Links */
.log-content a {
  color: #bc8cff;
  text-decoration: none;
}

.log-content a:hover {
  text-decoration: underline;
}

/* Bold emphasis */
.log-content strong {
  color: #e6edf3;
  font-weight: 600;
}

/* Entry animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.log-content.updated {
  animation: fadeIn 0.4s ease-out;
}

/* --- Scrollbar --- */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: #0d1117;
}
::-webkit-scrollbar-thumb {
  background: #30363d;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: #484f58;
}

/* --- Loading state --- */
.loading {
  color: #484f58;
  font-size: 0.8125rem;
  padding: 2rem;
  text-align: center;
}
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="branding">Mercury Build Log</div>
    <div class="status">
      <span class="status-text">Connecting</span>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </div>
</header>

<main>
  <div class="log-content" id="logContent">
    <div class="loading">Connecting to build log stream...</div>
  </div>
</main>

<script>
(function() {
  const logContent = document.getElementById('logContent');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.querySelector('.status-text');
  let evtSource = null;
  let reconnectTimer = null;

  function setConnected(connected) {
    if (connected) {
      statusDot.classList.add('connected');
      statusText.textContent = 'Live';
    } else {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Disconnected';
    }
  }

  function renderContent(data) {
    logContent.innerHTML = data.html;
    logContent.classList.remove('updated');
    // Force reflow to retrigger animation
    void logContent.offsetWidth;
    logContent.classList.add('updated');
    // Auto-scroll to bottom
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function connect() {
    if (evtSource) {
      evtSource.close();
    }

    evtSource = new EventSource('/api/stream');

    evtSource.addEventListener('init', function(e) {
      const data = JSON.parse(e.data);
      renderContent(data);
      setConnected(true);
    });

    evtSource.addEventListener('update', function(e) {
      const data = JSON.parse(e.data);
      renderContent(data);
    });

    evtSource.onerror = function() {
      setConnected(false);
      evtSource.close();
      // Reconnect after 3 seconds
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };
  }

  connect();
})();
</script>

</body>
</html>

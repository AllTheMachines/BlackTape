<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercury — Build Log</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* --- Header --- */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}

.header-top {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.625rem 1.5rem;
}

.branding {
  font-size: 0.875rem;
  font-weight: 600;
  color: #e6edf3;
}

.branding::before {
  content: '> ';
  color: #484f58;
}

.status {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: #8b949e;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f85149;
  transition: background 0.3s;
}

.status-dot.connected {
  background: #3fb950;
}

/* --- Stats bar --- */
.stats-bar {
  display: flex;
  gap: 0;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem 0.5rem;
}

.stat-box {
  flex: 1;
  text-align: center;
  padding: 0.375rem 0.5rem;
  border-right: 1px solid #21262d;
}

.stat-box:last-child {
  border-right: none;
}

.stat-value {
  font-size: 1.125rem;
  font-weight: 700;
  color: #e6edf3;
  transition: color 0.3s, text-shadow 0.3s;
}

.stat-value.flash {
  color: #3fb950;
  text-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
}

.stat-label {
  font-size: 0.625rem;
  color: #484f58;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* --- Commit ticker --- */
.commit-ticker {
  background: #0d1117;
  border-bottom: 1px solid #21262d;
  padding: 0.25rem 1.5rem;
  font-size: 0.6875rem;
  color: #8b949e;
  max-width: 1200px;
  margin: 0 auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.commit-ticker .commit-hash {
  color: #bc8cff;
  font-weight: 600;
}

.commit-ticker .commit-msg {
  color: #c9d1d9;
}

/* --- Main --- */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* --- Log entries --- */
.log-content h2 {
  color: #e6edf3;
  font-size: 0.875rem;
  font-weight: 600;
  margin: 2rem 0 1rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid #30363d;
}

.log-content h2:first-child {
  margin-top: 0;
}

.log-content h3 {
  color: #e6edf3;
  font-size: 0.8125rem;
  font-weight: 600;
  margin: 1.25rem 0 0.5rem;
}

.log-content h4 {
  color: #c9d1d9;
  font-size: 0.8125rem;
  font-weight: 600;
  margin: 1rem 0 0.375rem;
}

.log-content p {
  margin: 0.5rem 0;
  color: #c9d1d9;
  font-size: 0.8125rem;
}

.log-content hr {
  border: none;
  border-top: 1px solid #30363d;
  margin: 2rem 0;
}

/* Blockquotes */
.log-content blockquote {
  border-left: 3px solid #d29922;
  padding: 0.5rem 0.75rem;
  margin: 0.75rem 0;
  background: rgba(210, 153, 34, 0.06);
  border-radius: 0 0.375rem 0.375rem 0;
}

.log-content blockquote p {
  color: #e6edf3;
  font-style: italic;
  font-size: 0.8125rem;
}

.log-content blockquote strong {
  color: #d29922;
}

/* Code blocks */
.log-content pre {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 0.375rem;
  padding: 0.75rem;
  margin: 0.75rem 0;
  overflow-x: auto;
  font-size: 0.75rem;
  line-height: 1.5;
}

.log-content code {
  font-family: inherit;
  font-size: 0.75rem;
  color: #e6edf3;
}

.log-content p code {
  background: #21262d;
  padding: 0.125rem 0.375rem;
  border-radius: 0.25rem;
  font-size: 0.75rem;
}

/* Lists */
.log-content ul, .log-content ol {
  padding-left: 1.5rem;
  margin: 0.5rem 0;
}

.log-content li {
  font-size: 0.8125rem;
  margin: 0.25rem 0;
  color: #c9d1d9;
}

.log-content li strong {
  color: #e6edf3;
}

/* Tables */
.log-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0.75rem 0;
  font-size: 0.75rem;
}

.log-content th {
  text-align: left;
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid #30363d;
  color: #8b949e;
  font-weight: 600;
}

.log-content td {
  padding: 0.375rem 0.75rem;
  border-bottom: 1px solid #21262d;
  color: #c9d1d9;
}

/* Links */
.log-content a {
  color: #bc8cff;
  text-decoration: none;
}

.log-content a:hover {
  text-decoration: underline;
}

/* Bold emphasis */
.log-content strong {
  color: #e6edf3;
  font-weight: 600;
}

/* ======================
   SPECIAL BLOCK TYPES
   ====================== */

/* --- Chat blocks --- */
.block-chat {
  margin: 1rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.chat-bubble {
  max-width: 80%;
  padding: 0.5rem 0.75rem;
  border-radius: 0.75rem;
  font-size: 0.8125rem;
  line-height: 1.5;
  position: relative;
}

.chat-name {
  display: block;
  font-size: 0.625rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.125rem;
}

.chat-steve {
  align-self: flex-start;
  background: rgba(88, 166, 255, 0.1);
  border: 1px solid rgba(88, 166, 255, 0.25);
  border-radius: 0.75rem 0.75rem 0.75rem 0.25rem;
  color: #c9d1d9;
}

.chat-steve .chat-name {
  color: #58a6ff;
}

.chat-claude {
  align-self: flex-end;
  background: rgba(188, 140, 255, 0.1);
  border: 1px solid rgba(188, 140, 255, 0.25);
  border-radius: 0.75rem 0.75rem 0.25rem 0.75rem;
  color: #c9d1d9;
}

.chat-claude .chat-name {
  color: #bc8cff;
}

/* --- Decision blocks --- */
.block-decision {
  margin: 1rem 0;
  border-left: 3px solid #d29922;
  background: rgba(210, 153, 34, 0.06);
  border-radius: 0 0.375rem 0.375rem 0;
  overflow: hidden;
}

.decision-title {
  padding: 0.5rem 0.75rem;
  font-size: 0.8125rem;
  font-weight: 700;
  color: #d29922;
  background: rgba(210, 153, 34, 0.1);
  border-bottom: 1px solid rgba(210, 153, 34, 0.15);
}

.decision-body {
  padding: 0.5rem 0.75rem;
  font-size: 0.8125rem;
  color: #c9d1d9;
  line-height: 1.5;
}

.decision-rejected {
  padding: 0.375rem 0.75rem;
  font-size: 0.75rem;
  color: #f85149;
  background: rgba(248, 81, 73, 0.06);
  border-top: 1px solid rgba(248, 81, 73, 0.15);
}

/* --- Dead-end blocks --- */
.block-dead-end {
  margin: 1rem 0;
  padding: 0.625rem 0.75rem;
  border-left: 3px solid #f85149;
  background: rgba(248, 81, 73, 0.06);
  border-radius: 0 0.375rem 0.375rem 0;
  opacity: 0.85;
  font-size: 0.8125rem;
  color: #c9d1d9;
  line-height: 1.5;
}

/* --- Breakthrough blocks --- */
.block-breakthrough {
  margin: 1rem 0;
  padding: 0.625rem 0.75rem;
  border-left: 3px solid #3fb950;
  background: rgba(63, 185, 80, 0.06);
  border-radius: 0 0.375rem 0.375rem 0;
  font-size: 0.8125rem;
  color: #e6edf3;
  line-height: 1.5;
}

/* Shared label for dead-end / breakthrough */
.block-label {
  display: inline-block;
  font-size: 0.5625rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.125rem 0.375rem;
  border-radius: 0.25rem;
  margin-bottom: 0.375rem;
  vertical-align: top;
}

.block-dead-end .block-label {
  background: rgba(248, 81, 73, 0.15);
  color: #f85149;
}

.block-breakthrough .block-label {
  background: rgba(63, 185, 80, 0.15);
  color: #3fb950;
}

/* --- Status blocks (live activity) --- */
.block-status {
  margin: 1rem 0;
  padding: 0.625rem 0.75rem;
  border-left: 3px solid #58a6ff;
  background: rgba(88, 166, 255, 0.08);
  border-radius: 0 0.375rem 0.375rem 0;
  font-size: 0.8125rem;
  color: #e6edf3;
  line-height: 1.5;
  animation: statusPulse 3s ease-in-out infinite;
}

.block-status .block-label {
  background: rgba(88, 166, 255, 0.2);
  color: #58a6ff;
  animation: liveBlink 2s ease-in-out infinite;
}

.block-status .status-line {
  margin: 0.125rem 0;
}

@keyframes statusPulse {
  0%, 100% { border-left-color: #58a6ff; }
  50% { border-left-color: #388bfd; }
}

@keyframes liveBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* --- Live status ticker (header bar) --- */
.live-ticker {
  background: rgba(88, 166, 255, 0.08);
  border-bottom: 1px solid rgba(88, 166, 255, 0.2);
  padding: 0.25rem 1.5rem;
  font-size: 0.6875rem;
  color: #58a6ff;
  max-width: 1200px;
  margin: 0 auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: none;
}

.live-ticker.active {
  display: block;
}

.live-ticker::before {
  content: '\25CF  ';
  animation: liveBlink 2s ease-in-out infinite;
}

/* ======================
   ANIMATIONS
   ====================== */

/* New content slide-in */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.log-content.updated {
  animation: fadeIn 0.4s ease-out;
}

/* Stats flash */
@keyframes statFlash {
  0% { color: #3fb950; text-shadow: 0 0 8px rgba(63, 185, 80, 0.4); }
  100% { color: #e6edf3; text-shadow: none; }
}

.stat-value.flash {
  animation: statFlash 1.5s ease-out forwards;
}

/* --- Scrollbar --- */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: #0d1117;
}
::-webkit-scrollbar-thumb {
  background: #30363d;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: #484f58;
}

/* --- Loading state --- */
.loading {
  color: #484f58;
  font-size: 0.8125rem;
  padding: 2rem;
  text-align: center;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="branding">Mercury Build Log</div>
    <div class="status">
      <span class="status-text">Connecting</span>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </div>
  <div class="stats-bar" id="statsBar">
    <div class="stat-box">
      <div class="stat-value" id="statCommits">—</div>
      <div class="stat-label">Commits</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statFiles">—</div>
      <div class="stat-label">Files Changed</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statEntries">—</div>
      <div class="stat-label">Entries</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statPhase" style="font-size: 0.75rem">—</div>
      <div class="stat-label">Current Phase</div>
    </div>
  </div>
  <div class="commit-ticker" id="commitTicker">No commits yet</div>
  <div class="live-ticker" id="liveTicker"></div>
</header>

<main>
  <div class="log-content" id="logContent">
    <div class="loading">Connecting to build log stream...</div>
  </div>
</main>

<script>
(function() {
  const logContent = document.getElementById('logContent');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.querySelector('.status-text');
  const commitTicker = document.getElementById('commitTicker');
  const statCommits = document.getElementById('statCommits');
  const statFiles = document.getElementById('statFiles');
  const statEntries = document.getElementById('statEntries');
  const statPhase = document.getElementById('statPhase');
  const liveTicker = document.getElementById('liveTicker');

  let evtSource = null;
  let reconnectTimer = null;
  let prevStats = null;

  function setConnected(connected) {
    if (connected) {
      statusDot.classList.add('connected');
      statusText.textContent = 'Live';
    } else {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Disconnected';
    }
  }

  function flashStat(el) {
    el.classList.remove('flash');
    void el.offsetWidth; // force reflow
    el.classList.add('flash');
  }

  function updateStats(stats) {
    if (!stats) return;

    // Update values and flash if changed
    const newCommits = String(stats.commits);
    const newFiles = String(stats.filesChanged);
    const newEntries = String(stats.entries);

    if (prevStats && statCommits.textContent !== newCommits) flashStat(statCommits);
    if (prevStats && statFiles.textContent !== newFiles) flashStat(statFiles);
    if (prevStats && statEntries.textContent !== newEntries) flashStat(statEntries);

    statCommits.textContent = newCommits;
    statFiles.textContent = newFiles;
    statEntries.textContent = newEntries;
    statPhase.textContent = stats.currentPhase;

    // Update commit ticker
    if (stats.latestCommit) {
      commitTicker.innerHTML =
        '<span class="commit-hash">' + stats.latestCommit.hash + '</span> ' +
        '<span class="commit-msg">' + stats.latestCommit.message + '</span>' +
        ' <span style="color:#484f58">(' + stats.latestCommit.files + ' files)</span>';
    }

    // Update live status ticker
    if (stats.liveStatus) {
      liveTicker.textContent = stats.liveStatus;
      liveTicker.classList.add('active');
    } else {
      liveTicker.classList.remove('active');
    }

    prevStats = stats;
  }

  function renderContent(data) {
    logContent.innerHTML = data.html;
    logContent.classList.remove('updated');
    void logContent.offsetWidth;
    logContent.classList.add('updated');
    updateStats(data.stats);
    // Auto-scroll to bottom
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function connect() {
    if (evtSource) {
      evtSource.close();
    }

    evtSource = new EventSource('/api/stream');

    evtSource.addEventListener('init', function(e) {
      const data = JSON.parse(e.data);
      renderContent(data);
      setConnected(true);
    });

    evtSource.addEventListener('update', function(e) {
      const data = JSON.parse(e.data);
      renderContent(data);
    });

    evtSource.onerror = function() {
      setConnected(false);
      evtSource.close();
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };
  }

  connect();
})();
</script>

</body>
</html>
